<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commerce Editor Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); }
        .phone-frame { width: 375px; height: 812px; border: 12px solid #262626; border-radius: 48px; overflow: hidden; position: relative; }
        .notch { width: 160px; height: 34px; background: #262626; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 50; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white h-screen flex flex-col overflow-hidden">
    <!-- Top Bar -->
    <header class="h-16 border-b border-neutral-800 flex items-center justify-between px-6 glass z-50">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">A</div>
            <h1 class="text-lg font-bold tracking-tight">AI Commerce Builder</h1>
        </div>
        <div class="flex items-center gap-3">
            <button class="px-4 py-2 bg-neutral-800 hover:bg-neutral-700 rounded-lg text-sm font-medium transition-all">Save Draft</button>
            <button class="px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-bold shadow-lg shadow-blue-500/20 transition-all">Publish</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-72 border-r border-neutral-800 p-6 flex flex-col gap-8 bg-neutral-950/50">
            <section>
                <h3 class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-4">Sections</h3>
                <div class="space-y-2">
                    <div class="flex items-center gap-3 p-3 bg-blue-600/10 border border-blue-600/30 rounded-xl text-blue-400">
                        <div class="w-2 h-8 bg-blue-600 rounded-full"></div>
                        <span class="text-sm font-bold">Hero Banner</span>
                    </div>
                    <div class="flex items-center gap-3 p-3 hover:bg-neutral-900 rounded-xl text-neutral-400 transition-all">
                        <div class="w-2 h-8 bg-neutral-800 rounded-full"></div>
                        <span class="text-sm font-medium">Benefits Grid</span>
                    </div>
                    <div class="flex items-center gap-3 p-3 hover:bg-neutral-900 rounded-xl text-neutral-400 transition-all">
                        <div class="w-2 h-8 bg-neutral-800 rounded-full"></div>
                        <span class="text-sm font-medium">Customer Reviews</span>
                    </div>
                </div>
            </section>
            
            <button class="mt-auto py-3 border-2 border-dashed border-neutral-800 hover:border-blue-500 hover:text-blue-500 rounded-xl text-xs font-bold text-neutral-500 transition-all">
                + Add New Section
            </button>
        </aside>

        <!-- Canvas -->
        <main class="flex-1 bg-neutral-900 flex items-center justify-center p-12 overflow-y-auto">
            <div class="phone-frame bg-white shadow-[0_50px_100px_-20px_rgba(0,0,0,0.5)] scale-90">
                <div class="notch"></div>
                <div class="h-full overflow-y-auto pt-10 pb-20">
                    <!-- Hero Section -->
                    <section class="relative h-[450px] flex flex-col justify-end p-8 text-white">
                        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=375" class="absolute inset-0 w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
                        <div class="relative z-10">
                            <span class="px-3 py-1 bg-blue-600 rounded-full text-[10px] font-bold uppercase tracking-wider mb-3 inline-block">New Arrival</span>
                            <h2 class="text-4xl font-extrabold leading-tight mb-4">Crafted for Excellence</h2>
                            <p class="text-sm text-neutral-300 mb-8 leading-relaxed">Experience the future of productivity with our latest smart companion.</p>
                            <button class="w-full py-4 bg-white text-black font-bold rounded-2xl shadow-xl">Pre-order Now</button>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <!-- Properties -->
        <aside class="w-80 border-l border-neutral-800 p-6 bg-neutral-950/50">
            <h3 class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest mb-6">Properties</h3>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-neutral-400">Headline Text</label>
                    <input type="text" value="Crafted for Excellence" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-neutral-400">Primary Color</label>
                    <div class="flex gap-2">
                        <div class="w-8 h-8 bg-blue-600 rounded-full ring-2 ring-white ring-offset-2 ring-offset-neutral-900 cursor-pointer"></div>
                        <div class="w-8 h-8 bg-purple-600 rounded-full cursor-pointer"></div>
                        <div class="w-8 h-8 bg-rose-600 rounded-full cursor-pointer"></div>
                    </div>
                </div>
            </div>
        </aside>
    </div>
</body>
</html>
